name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      # Corrige l'avertissement de dépréciation Node.js dans GitHub Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      # Empêche l'arrêt du workflow si votre code contient de simples avertissements (warnings ESLint)
      CI: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Ajout de --legacy-peer-deps pour éviter les échecs liés aux conflits de versions de paquets
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Assurez-vous que './dist/' correspond bien au dossier généré par votre build
          local-dir: ./dist/ 
          server-dir: /public_html/dssip.bambaray.mg/
